name: Publish GHCR Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  precheck:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.decision.outputs.should_publish }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether publish should run
        id: decision
        run: |
          event_name='${{ github.event_name }}'
          ref='${{ github.ref }}'

          if [ "$event_name" = "workflow_dispatch" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$ref" == refs/tags/* ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before='${{ github.event.before }}'
          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          old_version=$(git show "$before:wyoming-edge-tts/config.yaml" | awk -F': ' '/^version:/{print $2; exit}')
          new_version=$(awk -F': ' '/^version:/{print $2; exit}' wyoming-edge-tts/config.yaml)

          if [ -z "$new_version" ]; then
            echo "Unable to read new version from wyoming-edge-tts/config.yaml"
            exit 1
          fi

          if [ "$old_version" != "$new_version" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: precheck
    if: needs.precheck.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Derive app version from config
        id: app
        run: |
          version=$(awk -F': ' '/^version:/{print $2; exit}' wyoming-edge-tts/config.yaml)
          if [ -z "$version" ]; then
            echo "Failed to read version from wyoming-edge-tts/config.yaml"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/wyoming-edge-tts
          tags: |
            type=raw,value=${{ steps.app.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./wyoming-edge-tts
          file: ./wyoming-edge-tts/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}